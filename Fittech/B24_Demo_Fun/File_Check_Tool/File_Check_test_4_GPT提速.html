<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>ChipData ID 集合比對工具</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tool-container {
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        .drop-zone {
            border: 3px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #ffffff;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            border: none;
        }

        .btn-folder {
            background: var(--accent);
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .drop-zone.drag-over {
            border-color: var(--accent);
            background: #eff6ff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #f1f5f9;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
            color: #475569;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        .id-tag {
            background: #eee;
            color: #333;
            padding: 3px 10px;
            border-radius: 4px;
            margin-right: 6px;
            display: inline-block;
            font-family: monospace;
            font-weight: bold;
        }

        .id-tag.mismatch {
            background: var(--danger);
            color: white;
        }

        .summary-card {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .ok {
            background: #dcfce7;
            color: #166534;
        }

        .fail {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>

<body>

    <div class="tool-container">
        <div style="text-align:center; margin-bottom: 20px;">
            <h2 style="color: var(--primary); margin: 0;">ChipData ID 集合比對工具</h2>
            <p style="color: #64748b;">讀取優化，僅提取目錄名稱</p>
        </div>

        <div id="dropZone" class="drop-zone">
            <strong style="font-size: 1.2rem;">【方法 A】選取多個 EOM 資料夾直接「拖進來」</strong>

            <div class="btn-group">
                <button class="btn btn-folder" onclick="document.getElementById('dirInput').click()">方法 B：選取母目錄</button>
            </div>

            <input type="file" id="dirInput" webkitdirectory directory multiple style="display:none">
        </div>

        <div id="resultArea"></div>
    </div>

    <script>
        const dirInput = document.getElementById('dirInput');
        const resultArea = document.getElementById('resultArea');
        const dropZone = document.getElementById('dropZone');

        // --- 拖放處理 ---
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });

        dropZone.addEventListener('drop', async (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            resultArea.innerHTML = "極速讀取中...";

            const groupMap = {};
            const queue = [];

            if (e.dataTransfer.items) {
                const items = e.dataTransfer.items;
                for (let i = 0; i < items.length; i++) {
                    // 優先使用最穩定的 FileSystemHandle API
                    if (typeof items[i].getAsFileSystemHandle === 'function') {
                        queue.push(items[i].getAsFileSystemHandle().then(handle => {
                            if (handle) return fastScanFileSystem(handle, groupMap);
                        }));
                    } else {
                        // 傳統 Entry 備用機制
                        const entry = items[i].webkitGetAsEntry();
                        if (entry) queue.push(fastScanEntry(entry, groupMap));
                    }
                }
                await Promise.all(queue);
            }
            renderResults(groupMap);
        });

        // --- 點擊處理 (方法 B：選取母目錄) ---
        dirInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                resultArea.innerHTML = "讀取中...";
                const groupMap = {};
                const files = Array.from(e.target.files);

                // 傳統點擊上傳的快速過濾：在記憶體中直接切字串，不碰不必要的檔案
                files.forEach(f => {
                    const path = f.webkitRelativePath;
                    if (path.includes('/ChipData/')) {
                        const segments = path.split('/');
                        const chipIdx = segments.indexOf('ChipData');
                        if (chipIdx !== -1 && segments.length > chipIdx + 1) {
                            const subFolder = segments[chipIdx + 1];
                            const parent = segments[chipIdx - 1];
                            const id = subFolder.split('_')[3];
                            if (id) {
                                if (!groupMap[parent]) groupMap[parent] = new Set();
                                groupMap[parent].add(id);
                            }
                        }
                    }
                });
                renderResults(groupMap);
                e.target.value = ''; // 清空快取
            }
        });

        // --- 【優化核心 1】現代 API 的熔斷深挖機制 ---
        async function fastScanFileSystem(handle, groupMap, parentName = "") {
            if (handle.kind === 'directory') {
                // 關鍵：如果當前資料夾叫 ChipData，撈完它的子目錄名稱後就「直接回傳」，絕不往下讀取裡面的細部檔案！
                if (handle.name === 'ChipData' && parentName !== "") {
                    for await (const entry of handle.values()) {
                        if (entry.kind === 'directory') {
                            const id = entry.name.split('_')[3];
                            if (id) {
                                if (!groupMap[parentName]) groupMap[parentName] = new Set();
                                groupMap[parentName].add(id);
                            }
                        }
                    }
                    return; // 熔斷：不再向下遞迴
                }

                // 如果還沒走到 ChipData，繼續往下找
                for await (const entry of handle.values()) {
                    await fastScanFileSystem(entry, groupMap, handle.name);
                }
            }
        }

        // --- 【優化核心 2】傳統 Entry API 的熔斷深挖機制 ---
        function fastScanEntry(entry, groupMap, parentName = "") {
            return new Promise((resolve) => {
                if (entry.isDirectory) {
                    // 關鍵：如果抓到 ChipData，只讀第一層子資料夾名稱
                    if (entry.name === 'ChipData' && parentName !== "") {
                        const dirReader = entry.createReader();
                        dirReader.readEntries((subEntries) => {
                            subEntries.forEach(sub => {
                                if (sub.isDirectory) {
                                    const id = sub.name.split('_')[3];
                                    if (id) {
                                        if (!groupMap[parentName]) groupMap[parentName] = new Set();
                                        groupMap[parentName].add(id);
                                    }
                                }
                            });
                            resolve(); // 撈完立即結束
                        }, () => resolve());
                    } else {
                        // 還沒到 ChipData，繼續往下巡檢
                        const dirReader = entry.createReader();
                        dirReader.readEntries((entries) => {
                            const promises = entries.map(e => fastScanEntry(e, groupMap, entry.name));
                            Promise.all(promises).then(() => resolve());
                        }, () => resolve());
                    }
                } else {
                    resolve();
                }
            });
        }

        // --- 渲染結果 (少數決比對邏輯) ---
        function renderResults(groupMap) {
            const parents = Object.keys(groupMap).sort();
            const totalGroups = parents.length;

            if (totalGroups === 0) {
                resultArea.innerHTML = "<p style='color:red; text-align:center;'>❌ 未發現符合格式的 ChipData 資料夾。<br><span style='font-size:0.85em;color:#666;'>提示：請確認拖入的資料夾內部含有「ChipData」目錄。</span></p>";
                return;
            }

            const idCounts = {};
            parents.forEach(p => {
                groupMap[p].forEach(id => { idCounts[id] = (idCounts[id] || 0) + 1; });
            });

            const allIdentical = Object.values(idCounts).every(count => count === totalGroups);

            let html = `<div class="summary-card ${allIdentical ? 'ok' : 'fail'}">
                狀態：${allIdentical ? '✅ 所有組別完全一致' : '❌ 偵測到異樣 ID (紅色為少數出現)'}
            </div>
            <table><thead><tr><th width="40%">資料夾 (來源)</th><th width="60%">ID 清單</th></tr></thead><tbody>`;

            parents.forEach(p => {
                const currentIds = Array.from(groupMap[p]).sort();
                html += `<tr><td>${p}</td><td>`;
                currentIds.forEach(id => {
                    const count = idCounts[id];
                    let isMismatch = totalGroups === 2 ? count < 2 : count <= (totalGroups / 2);
                    html += `<span class="id-tag ${isMismatch ? 'mismatch' : ''}">${id}</span>`;
                });
                html += `</td></tr>`;
            });
            resultArea.innerHTML = html + "</tbody></table>";
        }
    </script>
</body>

</html>
