<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <title>進位區段產生器</title>

  <style>
    body {
      font-family: "Inter", sans-serif;
      background: #f4f4f4;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    h4 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .container {
      width: 520px;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #ddd;
    }

    label {
      margin-top: 10px;
      display: block;
      font-size: 13px;
      color: #555;
    }

    input,
    select {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 16px;
      padding: 10px;
      width: 100%;
      border: none;
      background: #222;
      color: white;
      border-radius: 6px;
    }

    textarea {
      width: 100%;
      height: 220px;
      margin-top: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      padding: 10px;
      font-family: monospace;
    }
  </style>
</head>

<body>

  <div class="container">
    <h4>QT 16進位 數量32 間隔2 組數5</h4>
    <h4>283QL 16進位 數量39 間隔2 組數5</h4>
    <h4>483QL 36進位 數量39 間隔3 組數8</h4>

    <label>進位</label>
    <select id="baseSelect">
      <option value="16">16進位</option>
      <option value="36" selected>36進位</option>
    </select>

    <label>前兩碼起始</label>
    <input id="prefixStart">

    <label>前兩碼結束</label>
    <input id="prefixEnd">

    <label>每列數量</label>
    <input id="blockSize" type="number" value="39">

    <label>區段數量</label>
    <select id="blockCountSelect"></select>

    <label>間隔 gap</label>
    <select id="gapSelect"></select>

    <button onclick="generate()">產生</button>
    <button onclick="downloadCSV()">下載 CSV</button>

    <textarea id="output"></textarea>

  </div>

  <script>

    // ⭐⭐⭐ 只要改這裡 ⭐⭐⭐
    const GAP_OPTIONS = [2, 3];
    const BLOCK_COUNT_OPTIONS = [5, 8];

    // 初始化下拉選單
    function initDropdowns() {
      const gapSelect = document.getElementById("gapSelect");
      const blockSelect = document.getElementById("blockCountSelect");

      GAP_OPTIONS.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        if (v === 4) opt.selected = true;
        gapSelect.appendChild(opt);
      });

      BLOCK_COUNT_OPTIONS.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        if (v === 8) opt.selected = true;
        blockSelect.appendChild(opt);
      });
    }

    initDropdowns();

    // ===== 基礎轉換 =====
    const BASE_MAP = {
      16: "0123456789ABCDEF",
      36: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"
    };

    function toBase(val, base, len) {
      const chars = BASE_MAP[base];
      let r = "";
      while (val > 0) {
        r = chars[val % base] + r;
        val = Math.floor(val / base);
      }
      return r.padStart(len, "0");
    }

    function fromBase(str, base) {
      const chars = BASE_MAP[base];
      let r = 0;
      for (let c of str) {
        r = r * base + chars.indexOf(c);
      }
      return r;
    }

    // ===== 主功能 =====
    let csvData = "";

    function generate() {
      const base = parseInt(document.getElementById("baseSelect").value);
      const ps = document.getElementById("prefixStart").value.toUpperCase();
      const pe = document.getElementById("prefixEnd").value.toUpperCase();
      const blockSize = parseInt(document.getElementById("blockSize").value);
      const blockCount = parseInt(document.getElementById("blockCountSelect").value);
      const gap = parseInt(document.getElementById("gapSelect").value);

      let startP = fromBase(ps, base);
      let endP = fromBase(pe, base);

      let lines = [];

      // 表頭
      lines.push(Array.from({ length: blockSize }, (_, i) => i + 1).join(","));

      for (let p = startP; p <= endP; p++) {

        let prefix = toBase(p, base, 2);
        let startValue = fromBase(prefix + "00", base);

        for (let g = 0; g < blockCount; g++) {

          let row = [];

          for (let i = 0; i < blockSize; i++) {
            row.push(toBase(startValue + i, base, 4));
          }

          lines.push(row.join(","));
          startValue += blockSize + gap;
        }
      }

      csvData = lines.filter(l => l && l.trim()).join("\n");
      document.getElementById("output").value = csvData;
    }

    function downloadCSV() {
      const blob = new Blob([csvData], { type: "text/csv" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "data.csv";
      a.click();
    }

  </script>

</body>

</html>
