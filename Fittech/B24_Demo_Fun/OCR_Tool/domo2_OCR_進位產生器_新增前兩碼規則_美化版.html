<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <title>進位區段產生器 - 簡約</title>

  <style>
    :root {
      --primary-color: #222;
      --accent-color: #007AFF;
      --bg-color: #f8f9fa;
      --border-color: #e0e0e0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-color);
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: #fff;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border-color);
    }

    h2 {
      text-align: center;
      margin-bottom: 24px;
      font-weight: 600;
      color: var(--primary-color);
    }

    /* 簡約型號標籤風格 */
    .preset-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .preset-badge {
      padding: 8px 16px;
      background: #eee;
      border-radius: 20px;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .preset-badge:hover {
      background: #e0e0e0;
      color: #333;
    }

    .preset-badge.active {
      background: var(--primary-color);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .form-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      align-items: center;
      margin-bottom: 16px;
    }

    label {
      font-size: 13px;
      color: #888;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus, select:focus {
      border-color: var(--accent-color);
    }

    /* 選取狀態顯示 */
    .status-bar {
      text-align: center;
      font-size: 13px;
      color: var(--accent-color);
      margin-top: 12px;
      height: 20px;
      font-weight: 500;
    }

    button {
      margin-top: 10px;
      padding: 12px;
      width: 100%;
      border: none;
      background: var(--primary-color);
      color: white;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    .btn-download {
      background: #fff;
      color: var(--primary-color);
      border: 1px solid var(--primary-color);
      margin-top: 8px;
    }

    textarea {
      width: 100%;
      height: 200px;
      margin-top: 20px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      padding: 12px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      background: #fafafa;
      box-sizing: border-box;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>進位區段產生器</h2>

    <div class="preset-container">
      <div class="preset-badge" onclick="applyPreset(this, '283QT', 16, 32, 2, 5)">283QT</div>
      <div class="preset-badge" onclick="applyPreset(this, '283QL', 16, 39, 3, 5)">283QL</div>
      <div class="preset-badge" onclick="applyPreset(this, '283VCL', 16, 39, 3, 5)">283VCL</div>
      <div class="preset-badge" onclick="applyPreset(this, '483QT', 16, 32, 2, 7)">483QT</div>
      <div class="preset-badge" onclick="applyPreset(this, '483QL', 36, 39, 3, 8)">483QL</div>
    </div>

    <div class="form-row">
      <label>進位</label>
      <select id="baseSelect">
        <option value="16">16進位</option>
        <option value="36">36進位</option>
      </select>
    </div>

    <div class="form-row">
      <label>前兩碼起始</label>
      <input id="prefixStart" placeholder="例如: 1E">
    </div>

    <div class="form-row">
      <label>前兩碼結束</label>
      <input id="prefixEnd" placeholder="例如: 2H">
    </div>

    <div class="form-row">
      <label>每列數量</label>
      <input id="blockSize" type="number">
    </div>

    <div class="form-row">
      <label>區段數量 (組數)</label>
      <select id="blockCountSelect"></select>
    </div>

    <div class="form-row">
      <label>間隔 gap</label>
      <select id="gapSelect"></select>
    </div>

    <button onclick="generate()">產生資料</button>
    <div id="selectedStatus" class="status-bar">尚未選取型號</div>
    
    <button class="btn-download" onclick="downloadCSV()">下載 CSV</button>

    <textarea id="output" readonly></textarea>

  </div>

  <script>
    // 初始化選單
    const GAP_OPTIONS = [2, 3];
    const BLOCK_COUNT_OPTIONS = [5, 7, 8];

    function initDropdowns() {
      const gapSelect = document.getElementById("gapSelect");
      const blockSelect = document.getElementById("blockCountSelect");
      GAP_OPTIONS.forEach(v => gapSelect.add(new Option(v, v)));
      BLOCK_COUNT_OPTIONS.forEach(v => blockSelect.add(new Option(v, v)));
    }
    initDropdowns();

    /**
     * 帶入預設值並顯示選取狀態
     */
    function applyPreset(element, modelName, base, size, gap, count) {
      // 切換標籤樣式
      document.querySelectorAll('.preset-badge').forEach(b => b.classList.remove('active'));
      element.classList.add('active');

      // 帶入數值
      document.getElementById("baseSelect").value = base;
      document.getElementById("blockSize").value = size;
      document.getElementById("gapSelect").value = gap;
      document.getElementById("blockCountSelect").value = count;

      // 更新狀態列
      document.getElementById("selectedStatus").innerText = "目前選取型號：" + modelName;
    }

    const BASE_MAP = {
      16: "0123456789ABCDEF",
      36: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"
    };

    function toBase(val, base, len) {
      const chars = BASE_MAP[base];
      let r = "";
      if (val === 0) r = chars[0];
      while (val > 0) {
        r = chars[val % base] + r;
        val = Math.floor(val / base);
      }
      return r.padStart(len, "0");
    }

    function fromBase(str, base) {
      const chars = BASE_MAP[base];
      let r = 0;
      for (let c of str) {
        r = r * base + chars.indexOf(c);
      }
      return r;
    }

    // 核心邏輯：判斷升降冪 (第二位為偶數索引則升冪)
    function getSequenceMode(prefix) {
      const secondChar = prefix.substring(1, 2);
      const index = BASE_MAP[36].indexOf(secondChar);
      return (index % 2 === 0) ? "ASC" : "DESC";
    }

    let csvData = "";

    function generate() {
      const base = parseInt(document.getElementById("baseSelect").value);
      const ps = document.getElementById("prefixStart").value.toUpperCase();
      const pe = document.getElementById("prefixEnd").value.toUpperCase();
      const blockSize = parseInt(document.getElementById("blockSize").value);
      const blockCount = parseInt(document.getElementById("blockCountSelect").value);
      const gap = parseInt(document.getElementById("gapSelect").value);

      if (!ps || !pe || !blockSize) {
        alert("請輸入完整參數");
        return;
      }

      let startP = fromBase(ps, base);
      let endP = fromBase(pe, base);
      let lines = [];

      // 表頭 (1, 2, 3...)
      let header = [];
      for (let i = 1; i <= blockSize; i++) header.push(i);
      lines.push(header.join(","));

      for (let p = startP; p <= endP; p++) {
        let prefix = toBase(p, base, 2);
        let mode = getSequenceMode(prefix); 
        let startValue = fromBase(prefix + "00", base);

        for (let g = 0; g < blockCount; g++) {
          let chipIDs = [];
          for (let i = 0; i < blockSize; i++) {
            chipIDs.push(toBase(startValue + i, base, 4));
          }

          if (mode === "DESC") chipIDs.reverse();

          lines.push(chipIDs.join(","));
          startValue += blockSize + gap;
        }
      }

      csvData = lines.join("\n");
      document.getElementById("output").value = csvData;
    }

    function downloadCSV() {
      if (!csvData) {
        alert("請先產生資料");
        return;
      }
      const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvData], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `ChipID_Result.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>

</body>

</html>
